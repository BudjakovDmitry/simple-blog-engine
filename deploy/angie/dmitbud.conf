resolver 1.1.1.1 1.0.0.1 ipv6=off valid=300s;

acme_client dmitbud https://acme-v02.api.letsencrypt.org/directory
    email=me@dmitbud.tech
    challenge=http;

upstream dmitbud {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name dmitbud.tech www.dmitbud.tech;

    acme dmitbud;

    return 301 https://dmitbud.tech$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dmitbud.tech www.dmitbud.tech;

    ssl_certificate $acme_cert_dmitbud;
    ssl_certificate_key $acme_cert_key_dmitbud;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:TLS:10m;
    ssl_session_timeout 1d;

    if ($host = www.dmitbud.tech) {
        return 301 https://dmitbud.tech$request_uri;
    }

    location /static/ {
        alias /home/www/code/blog/staticfiles/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://dmitbud;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
