{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="description" content="{{ article.lead }}">
    <title>{{ article.title }}</title>
    <link rel="stylesheet" href="{% static 'blog/style.css' %}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <nav class="site-navigation">
        <a href="/" class="brand">dmitbud.tech</a>
        <ul class="navigation-list">
          {% for stream in stream_list %}
            <li class="navigation-list-item">
              <a href="/{{ stream.route }}" class="nav-link" title="{{ stream.name }}">{{ stream.name }}</a>
            </li>
          {% endfor %}
        </ul>
      </nav>
    </div>
  </header>
  <main class="main-inner reading-area">
    <article class="article">
      <header class="article-header">
        <h1 class="article-title">{{ article.title }}</h1>
      </header>
    {{ article.formatted_text|safe }}
    </article>
  </main>

  <footer class="site-footer">

      <p>Связаться со мной: <a href="mailto:me@dmitbud.tech">me@dmitbud.tech</a></p>
    </div>
  </footer>
  -->
</body>
</html>
